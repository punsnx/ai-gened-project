<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Classification Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .section {
            margin-bottom: 30px;
        }

        .label {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }

        video {
            width: 100%;
            border-radius: 12px;
            background: #000;
            margin-bottom: 15px;
            display: block;
        }

        canvas {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #e53e3e;
            transform: translateY(-2px);
        }

        .result {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: bold;
            color: #555;
        }

        .result-value {
            color: #667eea;
            font-weight: bold;
        }

        .status {
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Classification</h1>

        <div class="section">
            <label class="label">📹 Camera Feed</label>
            <video id="video" playsinline autoplay></video>
            <div class="button-group">
                <button class="btn-primary" id="startBtn">Start Camera</button>
                <button class="btn-primary" id="captureBtn" disabled>Capture & Classify</button>
                <button class="btn-primary" id="realtimeBtn" disabled>Start Real-time</button>
                <button class="btn-danger" id="stopBtn" disabled>Stop</button>
            </div>
        </div>

        <div id="status" class="status"></div>

        <canvas id="canvas"></canvas>

        <div id="result" class="result">
            <div class="result-row">
                <span class="result-label">🎯 Predicted Class:</span>
                <span class="result-value" id="className">-</span>
            </div>
            <div id="probabilityRows"></div>
            <div class="result-row">
                <span class="result-label">📊 Confidence:</span>
                <span class="result-value" id="confidence">-</span>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const captureBtn = document.getElementById('captureBtn');
        const realtimeBtn = document.getElementById('realtimeBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        const probabilityRows = document.getElementById('probabilityRows');

        let stream = null;
        let realtimeEnabled = false;
        let realtimeTimer = null;
        let classifyInFlight = false;
        const REALTIME_INTERVAL_MS = 900;

        // Start camera
        startBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                startBtn.disabled = true;
                captureBtn.disabled = false;
                realtimeBtn.disabled = false;
                stopBtn.disabled = false;
                showStatus('Camera started', 'success');
            } catch (err) {
                showStatus('Camera access denied: ' + err.message, 'error');
            }
        });

        function canvasToBlob(canvas, type = 'image/jpeg', quality = 0.9) {
            return new Promise((resolve, reject) => {
                canvas.toBlob((blob) => {
                    if (blob) resolve(blob);
                    else reject(new Error('Failed to capture frame'));
                }, type, quality);
            });
        }

        async function classifyFrame({ silent = false } = {}) {
            if (!stream || classifyInFlight || !video.videoWidth || !video.videoHeight) return;

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            if (!silent) showStatus('<span class="loading"></span> Classifying...', 'info');

            try {
                classifyInFlight = true;
                const blob = await canvasToBlob(canvas, 'image/jpeg', 0.9);
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');

                const response = await fetch('/inference', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Classification failed');

                const data = await response.json();
                displayResult(data);
                if (!silent) showStatus('Classification complete!', 'success');
            } catch (err) {
                if (realtimeEnabled) {
                    stopRealtime(false);
                    showStatus('Real-time stopped: ' + err.message, 'error');
                } else {
                    showStatus('Error: ' + err.message, 'error');
                }
            } finally {
                classifyInFlight = false;
            }
        }

        function stopRealtime(showMessage = true) {
            realtimeEnabled = false;
            if (realtimeTimer) {
                clearInterval(realtimeTimer);
                realtimeTimer = null;
            }
            realtimeBtn.textContent = 'Start Real-time';
            realtimeBtn.classList.remove('btn-danger');
            realtimeBtn.classList.add('btn-primary');
            if (stream) captureBtn.disabled = false;
            if (showMessage) showStatus('Real-time classification stopped', 'info');
        }

        // Capture and classify once
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            await classifyFrame({ silent: false });
            if (!realtimeEnabled && stream) captureBtn.disabled = false;
        });

        // Toggle real-time classify
        realtimeBtn.addEventListener('click', async () => {
            if (!stream) {
                showStatus('Start camera first', 'error');
                return;
            }

            if (realtimeEnabled) {
                stopRealtime();
                return;
            }

            realtimeEnabled = true;
            realtimeBtn.textContent = 'Stop Real-time';
            realtimeBtn.classList.remove('btn-primary');
            realtimeBtn.classList.add('btn-danger');
            captureBtn.disabled = true;
            showStatus('Real-time classification started', 'success');

            await classifyFrame({ silent: true });
            realtimeTimer = setInterval(() => {
                classifyFrame({ silent: true });
            }, REALTIME_INTERVAL_MS);
        });

        // Stop camera
        stopBtn.addEventListener('click', () => {
            stopRealtime(false);
            if (stream) stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
            stream = null;
            startBtn.disabled = false;
            captureBtn.disabled = true;
            realtimeBtn.disabled = true;
            stopBtn.disabled = true;
            resultDiv.classList.remove('show');
            showStatus('Camera stopped', 'info');
        });

        // Display result
        function displayResult(data) {
            document.getElementById('className').textContent = data.result || '-';
            document.getElementById('confidence').textContent = Number(data.percent || 0).toFixed(2) + '%';
            renderProbabilityRows({});
            resultDiv.classList.add('show');
        }

        function humanizeClassName(name) {
            if (!name) return '-';
            return name.split('_').map(x => x.charAt(0).toUpperCase() + x.slice(1)).join(' ');
        }

        function renderProbabilityRows(probabilities) {
            const sortedEntries = Object.entries(probabilities).sort((a, b) => b[1] - a[1]);
            if (sortedEntries.length === 0) {
                probabilityRows.innerHTML = '';
                return;
            }

            probabilityRows.innerHTML = sortedEntries.map(([label, value]) => `
                <div class="result-row">
                    <span class="result-label">${humanizeClassName(label)}:</span>
                    <span class="result-value">${Number(value).toFixed(2)}%</span>
                </div>
            `).join('');
        }

        // Show status message
        function showStatus(message, type = 'info') {
            statusDiv.innerHTML = message;
            statusDiv.className = `status show ${type}`;
            setTimeout(() => {
                if (type !== 'info') statusDiv.classList.remove('show');
            }, 4000);
        }
    </script>
</body>
</html>
